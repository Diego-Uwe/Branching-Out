<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Merge Animation</title>
</head>
<body style="color: #00ff00; font-family: monospace; font-size: 22px;">

    <div style="border: 2px solid #00ff00; padding: 15px; width: 420px; height: 50px; background-color: black; white-space: nowrap; overflow: hidden; display: flex; align-items: center;">
        <span id="terminal-text" style="display: inline-block;"></span>
        <span id="cursor" style="display: inline-block; width: 10px; height: 24px; background-color: #00ff00; margin-left: 5px; animation: blink 0.8s infinite;"></span>
    </div>

    <script>
        const command = "git merge feature-branch";
        let index = 0;
        let deleting = false;

        function typeEffect() {
            let terminalText = document.getElementById("terminal-text");

            if (!deleting) {
                terminalText.innerHTML = command.slice(0, index);
                index++;

                if (index > command.length) {
                    setTimeout(() => { deleting = true; }, 1000); // Pause before deleting
                }
            } else {
                terminalText.innerHTML = command.slice(0, index);
                index--;

                if (index < 0) {
                    deleting = false;
                    index = 0;
                }
            }

            let speed = deleting ? 50 : 100; // Typing is slower, deleting is faster
            setTimeout(typeEffect, speed);
        }

        typeEffect();
    </script>

    <style>
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>

</body>
</html>
