<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Merge Animation (Humor)</title>
    <style>
        body {

            background-color: #222;
            color: white;
            font-family: monospace;
            font-size: 18px;
        }
        .terminal {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border: 2px solid white;
            padding: 20px;
            width: 400px;
            height: 200px;
            overflow: hidden;
            background-color: black;
        }
        .line {
            opacity: 0;
            white-space: pre;
        }
        .show {
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="line">$ git checkout -b cool-feature</div>
        <div class="line">✨ Branch created. You fancy now. ✨</div>
        <div class="line">🤔 Adding new feature! Hope it works...</div>
        <div class="line">🤩 Awesome! Better commit!</div>
        <div class="line">$ git checkout main</div>
        <div class="line">😎 Back to safety</div>
        <div class="line">$ git merge cool-feature</div>
        <div class="line">🔥 Things are getting spicy...</div>
        <div class="line">Merge successful! 🎉</div>
    </div>

    <script>
        const lines = document.querySelectorAll('.line');
        lines.forEach((line, index) => {
            setTimeout(() => {
                line.classList.add('show');
            }, index * 1000);
        });
    </script>
</body>
</html>
